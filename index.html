<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Image Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* Blurred background preview */
        #preview-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('IMG_20260628_171452.jpg') center/cover;
            filter: blur(20px) brightness(0.3);
            transform: scale(1.1);
            transition: opacity 0.6s ease;
        }

        /* Center card */
        #gate {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #gate.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.9);
            pointer-events: none;
        }

        /* Lock icon */
        .lock-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Sleek button */
        #reveal-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        #reveal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        #reveal-btn:active {
            transform: translateY(0);
        }

        /* Loading spinner (hidden by default) */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main image container */
        #image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }

        #image-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        /* Hidden audio */
        audio {
            display: none;
        }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            #reveal-btn { padding: 14px 36px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- Blurred background -->
    <div id="preview-bg"></div>

    <!-- Click gate -->
    <div id="gate">
        <div class="lock-icon">🔒</div>
        <h1>Image Protected</h1>
        <p>Click to view full resolution image</p>
        <button id="reveal-btn">
            <span class="btn-text">View Image</span>
            <div class="spinner"></div>
        </button>
    </div>

    <!-- Full image -->
    <div id="image-container">
        <img src="IMG_20260628_171452.jpg" alt="Image">
    </div>

    <!-- Audio -->
    <audio id="bgAudio" loop>
        <source src="jo-gareeb-hove-naa.mp3" type="audio/mpeg">
    </audio>

    <script>
        const gate = document.getElementById('gate');
        const imageContainer = document.getElementById('image-container');
        const previewBg = document.getElementById('preview-bg');
        const audio = document.getElementById('bgAudio');
        const btn = document.getElementById('reveal-btn');
        const btnText = btn.querySelector('.btn-text');
        const spinner = btn.querySelector('.spinner');

        btn.addEventListener('click', () => {
            // Show loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            btn.style.pointerEvents = 'none';

            // Play audio immediately
            audio.play().catch(err => {
                console.log('Audio blocked:', err);
            });

            // Fake loading delay for realism (800ms)
            setTimeout(() => {
                // Hide gate
                gate.classList.add('hidden');
                
                // Show full image
                imageContainer.classList.add('visible');
                
                // Fade out blurred background
                previewBg.style.opacity = '0';
                
                // Allow body to scroll if image is tall
                document.body.style.overflow = 'auto';
                document.body.style.height = 'auto';
            }, 800);
        });
    </script>

</body>
</html>
